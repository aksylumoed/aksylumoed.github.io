<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adndkr</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Code+Latin&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <a href="/" id="homeLink">●</a>
        <div id="langSwitcher" class="lang-switcher"></div>
    </div>

    <div id="loadingIndicator">
        <div id="fetchingText" data-i18n="fetching">fetching...</div>
        <div id="progressText"></div>
    </div>

    <img id="initialArtwork">

    <!-- Container for the navigation arrows on the bottom-right -->
    <div id="navigationContainer" class="navigation-container">
      <div class="navigation remote-navigation">
        <div class="navigation-button up">&#94;</div>
        <div class="horizontal-arrows">
          <div class="navigation-button left">&#60;</div>
          <div class="navigation-button right">&#62;</div>
        </div>
        <div class="navigation-button down">&#118;</div>
      </div>
    </div>

    <!-- Container for deployed status, panel, title and description on the bottom-left -->
    <div id="infoContainer" class="info-container">
      <div id="deploymentStatus" class="deployment-status">
        <span id="statusDot" class="status-dot status-loading"></span>
        <span id="statusLabel" class="status-label"></span>
      </div>

      <div id="infoBody" class="info-body">
        <div id="trajectoryPanel" class="trajectory-panel">
          <div class="trajectory-header">
            <span class="trajectory-divider">──────────────────</span>
          </div>
          <div id="trajectoryContent" class="trajectory-content"></div>
        </div>
        <div class="info-title-desc">
          <p id="artworkTitle" class="artwork-title"></p>
          <p id="artworkDescription" class="artwork-description"></p>
        </div>
      </div>
    </div>

    <script>if (!window.location.hash) window.location.replace(window.location.href + '#/8');</script>
    <script src="../dist/bundle.js"></script>
  </body>
</html>
