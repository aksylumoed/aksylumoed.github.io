<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adndkr</title>
    <link rel="stylesheet" href="../scan/scan.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Code+Latin&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scan-container">
        <a href="/" class="scan-home">●</a>
        <div id="langSwitcher" class="lang-switcher"></div>
        <div class="scan-prompt" id="notesPrompt">work in progress.</div>
    </div>
    <script>
      (function () {
        var t = { en: { prompt: 'work in progress.' }, de: { prompt: 'in arbeit.' } };
        var lang = localStorage.getItem('lang') === 'de' ? 'de' : 'en';
        document.getElementById('notesPrompt').textContent = t[lang].prompt;
        var sw = document.getElementById('langSwitcher');
        sw.innerHTML =
          '<span class="lang-option' + (lang === 'en' ? ' lang-active' : '') + '" data-lang="en">EN</span>' +
          '<span class="lang-sep"> | </span>' +
          '<span class="lang-option' + (lang === 'de' ? ' lang-active' : '') + '" data-lang="de">DE</span>';
        sw.querySelectorAll('.lang-option').forEach(function (el) {
          el.addEventListener('click', function () {
            var l = el.getAttribute('data-lang');
            if (l !== lang) { localStorage.setItem('lang', l); location.reload(); }
          });
        });
      })();
    </script>
</body>
</html>
