<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adndkr</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Code+Latin&display=swap" rel="stylesheet">

</head>
<body>
    <div id="langSwitcher" class="lang-switcher"></div>
    <div class="container">
        <img src="title.webp" alt="Main Artwork" class="logo-image">
        <a href="objects/" class="view-link" id="navObjects">/objects</a>
        <a href="notes/" class="view-link" id="navNotes">/notes</a>
        <a href="https://www.instagram.com/adndkr" class="view-link" id="navContact">/contact</a>
    </div>
    <script>
        document.body.style.height = window.innerHeight + 'px';
        (function () {
          var t = {
            en: { objects: '/objects', notes: '/notes', contact: '/contact' },
            de: { objects: '/objekte', notes: '/notizen', contact: '/kontakt' }
          };
          var lang = localStorage.getItem('lang') === 'de' ? 'de' : 'en';
          document.getElementById('navObjects').textContent = t[lang].objects;
          document.getElementById('navNotes').textContent = t[lang].notes;
          document.getElementById('navContact').textContent = t[lang].contact;
          var sw = document.getElementById('langSwitcher');
          sw.innerHTML =
            '<span class="lang-option' + (lang === 'en' ? ' lang-active' : '') + '" data-lang="en">EN</span>' +
            '<span class="lang-sep"> | </span>' +
            '<span class="lang-option' + (lang === 'de' ? ' lang-active' : '') + '" data-lang="de">DE</span>';
          sw.querySelectorAll('.lang-option').forEach(function (el) {
            el.addEventListener('click', function () {
              var l = el.getAttribute('data-lang');
              if (l !== lang) { localStorage.setItem('lang', l); location.reload(); }
            });
          });
        })();
    </script>
</body>
</html>
